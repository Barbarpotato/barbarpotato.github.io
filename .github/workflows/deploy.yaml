name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write  # ✅ Grant permission to push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy 🚀
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}  # ✅ Use GitHub token for authentication
        run: npx gh-pages -d dist -u "github-actions-bot <github-actions@github.com>"
